server {
    listen       80;
    server_name  localhost;
    root         /usr/share/nginx/html;
    index        index.html;

    # ------------------------------------------------------------------
    # Gzip compression
    # ------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
      text/plain
      text/css
      text/javascript
      text/xml
      application/json
      application/javascript
      application/xml+rss
      application/x-javascript
      image/svg+xml;

    # ------------------------------------------------------------------
    # Security headers
    # ------------------------------------------------------------------
    add_header X-Frame-Options         "SAMEORIGIN" always;
    add_header X-Content-Type-Options  "nosniff"    always;
    add_header X-XSS-Protection        "1; mode=block" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # ------------------------------------------------------------------
    # Hashed static assets — immutable, long cache
    # Vite outputs to /assets/js/*-[hash].js, /assets/css/*-[hash].css, etc.
    # ------------------------------------------------------------------
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ------------------------------------------------------------------
    # index.html — never cached (so new deploys take effect immediately)
    # ------------------------------------------------------------------
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ------------------------------------------------------------------
    # SPA fallback — all routes serve index.html
    # (Vue Router is in hash mode, so this is mainly a safety net)
    # ------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ------------------------------------------------------------------
    # Deny access to hidden files
    # ------------------------------------------------------------------
    location ~ /\. {
        deny all;
    }
}
